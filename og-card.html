<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1200px; height:630px; overflow:hidden; font-family:'Georgia', serif; }

  .card {
    width:1200px; height:630px;
    background: linear-gradient(135deg, #060F22 0%, #0A1F44 50%, #0d2657 100%);
    position:relative; overflow:hidden;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
  }

  /* Décoration : cercles dorés */
  .c1 { position:absolute; top:-160px; right:-160px; width:520px; height:520px; border-radius:50%; border:1px solid rgba(201,168,76,.15); }
  .c2 { position:absolute; top:-100px; right:-100px; width:380px; height:380px; border-radius:50%; border:1px solid rgba(201,168,76,.10); }
  .c3 { position:absolute; bottom:-160px; left:-160px; width:480px; height:480px; border-radius:50%; border:1px solid rgba(201,168,76,.12); }
  .c4 { position:absolute; bottom:-100px; left:-100px; width:320px; height:320px; border-radius:50%; border:1px solid rgba(201,168,76,.08); }

  /* Glow centraux */
  .glow-top    { position:absolute; top:-100px;    left:50%; transform:translateX(-50%); width:700px; height:400px; border-radius:50%; background:radial-gradient(circle, rgba(201,168,76,.07) 0%, transparent 70%); }
  .glow-bottom { position:absolute; bottom:-100px; left:50%; transform:translateX(-50%); width:600px; height:350px; border-radius:50%; background:radial-gradient(circle, rgba(20,60,140,.25) 0%, transparent 70%); }

  /* Ligne dorée en haut */
  .top-bar { position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(to right, transparent, #C9A84C 30%, #C9A84C 70%, transparent); }
  /* Ligne dorée en bas */
  .bottom-bar { position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(to right, transparent, #C9A84C 30%, #C9A84C 70%, transparent); }

  /* Contenu centré */
  .content { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; gap:0; padding:0 80px; width:100%; }

  /* Badge pays */
  .badge {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(201,168,76,.1); border:1px solid rgba(201,168,76,.3);
    border-radius:30px; padding:6px 20px; margin-bottom:30px;
  }
  .badge-dot { width:7px; height:7px; border-radius:50%; background:#C9A84C; flex-shrink:0; }
  .badge-text { font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#C9A84C; font-family:Arial,sans-serif; font-weight:700; }

  /* Nom principal */
  .brand { font-size:82px; font-weight:700; color:#fff; line-height:.95; letter-spacing:-.02em; margin-bottom:10px; }
  .brand span { color:#C9A84C; }
  .brand-sub { font-size:28px; font-weight:400; color:#C9A84C; letter-spacing:.04em; margin-bottom:6px; font-family:Georgia,serif; font-style:italic; }

  /* Tagline */
  .tagline { font-size:13px; letter-spacing:.22em; text-transform:uppercase; color:rgba(255,255,255,.35); font-family:Arial,sans-serif; margin-bottom:38px; }

  /* Séparateur */
  .sep { width:80px; height:1px; background:linear-gradient(to right, transparent, #C9A84C, transparent); margin-bottom:38px; }

  /* Services */
  .services { display:flex; gap:20px; justify-content:center; margin-bottom:38px; }
  .svc {
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,.05); border:1px solid rgba(201,168,76,.22);
    border-radius:14px; padding:12px 22px;
    backdrop-filter:blur(4px);
  }
  .svc-ico { font-size:22px; }
  .svc-lbl { font-size:15px; color:rgba(255,255,255,.85); font-family:Arial,sans-serif; font-weight:500; white-space:nowrap; }

  /* URL */
  .url-row { display:flex; align-items:center; gap:10px; }
  .url-dot { width:8px; height:8px; border-radius:50%; background:#C9A84C; }
  .url { font-size:16px; color:rgba(201,168,76,.85); font-family:Arial,sans-serif; letter-spacing:.06em; font-weight:600; }
</style>
</head>
<body>
<div class="card">
  <div class="c1"></div><div class="c2"></div>
  <div class="c3"></div><div class="c4"></div>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>
  <div class="top-bar"></div>
  <div class="bottom-bar"></div>

  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">Abidjan &nbsp;·&nbsp; Côte d'Ivoire</span>
    </div>

    <div class="brand">RAZAK <span>Multi</span> Service</div>
    <div class="brand-sub">Excellence &amp; Confiance</div>
    <div class="tagline">Automobile &nbsp;·&nbsp; Immobilier &nbsp;·&nbsp; Ameublement</div>

    <div class="sep"></div>

    <div class="services">
      <div class="svc"><div class="svc-ico">🚗</div><span class="svc-lbl">Véhicules à vendre &amp; location</span></div>
      <div class="svc"><div class="svc-ico">🏠</div><span class="svc-lbl">Biens immobiliers</span></div>
      <div class="svc"><div class="svc-ico">🛋️</div><span class="svc-lbl">Meubles &amp; décoration</span></div>
    </div>

    <div class="url-row">
      <div class="url-dot"></div>
      <span class="url">razak-multiservices.com</span>
      <div class="url-dot"></div>
    </div>
  </div>
</div>
</body>
</html>
